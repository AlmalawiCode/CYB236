<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأسبوع 9: آليات الدفاع - CYB236 بنك الأسئلة</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; color: #fff; line-height: 1.6;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        header { text-align: center; margin-bottom: 40px; }
        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            color: #94a3b8; text-decoration: none; margin-bottom: 20px; transition: color 0.3s;
        }
        .back-link:hover { color: #00d4ff; }
        .quiz-badge {
            display: inline-block; background: linear-gradient(90deg, #00d4ff, #0099cc);
            padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; margin-bottom: 15px;
        }
        header h1 { font-size: 2rem; margin-bottom: 10px; color: #fff; }
        header p { color: #94a3b8; }
        .progress-container {
            background: rgba(255,255,255,0.1); border-radius: 10px; padding: 20px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;
        }
        .progress-stats { display: flex; gap: 30px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: #00d4ff; }
        .stat-label { font-size: 0.8rem; color: #94a3b8; }
        .progress-bar-container { flex: 1; min-width: 200px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            border-radius: 4px; transition: width 0.3s ease; width: 0%;
        }
        .question-card {
            background: rgba(255,255,255,0.05); border-radius: 16px; padding: 25px; margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease;
        }
        .question-card:hover { border-color: rgba(0,212,255,0.3); }
        .question-card.correct { border-color: #10b981; background: rgba(16,185,129,0.1); }
        .question-card.incorrect { border-color: #ef4444; background: rgba(239,68,68,0.1); }
        .question-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .question-number {
            width: 40px; height: 40px; border-radius: 10px; background: rgba(0,212,255,0.2);
            color: #00d4ff; display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0;
        }
        .question-type {
            font-size: 0.75rem; padding: 4px 10px; border-radius: 12px;
            background: rgba(255,255,255,0.1); color: #94a3b8;
        }
        .question-text { font-size: 1.1rem; margin-bottom: 20px; color: #fff; }
        .options-list { list-style: none; }
        .option-item { margin-bottom: 10px; }
        .option-label {
            display: flex; align-items: center; gap: 12px; padding: 15px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; cursor: pointer; transition: all 0.2s ease;
        }
        .option-label:hover { background: rgba(255,255,255,0.08); border-color: rgba(0,212,255,0.3); }
        .option-label.selected { background: rgba(0,212,255,0.15); border-color: #00d4ff; }
        .option-label.correct { background: rgba(16,185,129,0.2); border-color: #10b981; }
        .option-label.incorrect { background: rgba(239,68,68,0.2); border-color: #ef4444; }
        .option-label.show-correct { background: rgba(16,185,129,0.2); border-color: #10b981; }
        .option-label input { display: none; }
        .option-marker {
            width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s ease;
        }
        .option-label.selected .option-marker { border-color: #00d4ff; background: #00d4ff; }
        .option-label.correct .option-marker { border-color: #10b981; background: #10b981; }
        .option-label.incorrect .option-marker { border-color: #ef4444; background: #ef4444; }
        .option-label.show-correct .option-marker { border-color: #10b981; background: #10b981; }
        .option-marker::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: transparent; }
        .option-label.selected .option-marker::after,
        .option-label.correct .option-marker::after,
        .option-label.show-correct .option-marker::after { background: #fff; }
        .option-label.incorrect .option-marker::after {
            content: '\00d7'; background: none; color: #fff; font-size: 16px; font-weight: bold;
        }
        .option-text { flex: 1; }
        .feedback {
            margin-top: 15px; padding: 12px 15px; border-radius: 8px; display: none; align-items: center; gap: 10px;
        }
        .feedback.show { display: flex; }
        .feedback.correct { background: rgba(16,185,129,0.2); color: #10b981; }
        .feedback.incorrect { background: rgba(239,68,68,0.2); color: #ef4444; }
        .results-card {
            background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(123,44,191,0.1));
            border-radius: 20px; padding: 40px; text-align: center; margin-top: 40px;
            border: 1px solid rgba(255,255,255,0.1); display: none;
        }
        .results-card.show { display: block; }
        .results-score {
            font-size: 4rem; font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .results-text { font-size: 1.2rem; color: #94a3b8; margin: 15px 0; }
        .results-message { font-size: 1.5rem; margin: 20px 0; }
        .btn {
            display: inline-block; padding: 12px 30px; border-radius: 25px; text-decoration: none;
            font-weight: 600; transition: all 0.3s ease; border: none; cursor: pointer; font-size: 1rem;
        }
        .btn-primary { background: linear-gradient(90deg, #00d4ff, #7b2cbf); color: #fff; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,212,255,0.3); }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; margin-right: 10px; }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }
        .action-buttons { margin-top: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        @media (max-width: 600px) {
            .progress-stats { width: 100%; justify-content: space-around; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="text-align:center;margin-bottom:15px;">
                <a href="week9.html" style="color:#00d4ff;text-decoration:none;font-size:0.9rem;padding:5px 14px;border:1px solid rgba(0,212,255,0.3);border-radius:20px;">English Version</a>
            </div>
            <a href="index-ar.html" class="back-link">&rarr; العودة إلى بنك الأسئلة</a>
            <div class="quiz-badge">الأسبوع 9</div>
            <h1>آليات الدفاع</h1>
            <p>الدفاع ضد XSS، رموز CSRF، منع XXE، الدفاع ضد الحقن، CSP</p>
        </header>
        <div class="progress-container">
            <div class="progress-stats">
                <div class="stat"><div class="stat-value" id="answered-count">0</div><div class="stat-label">تم الإجابة</div></div>
                <div class="stat"><div class="stat-value" id="correct-count">0</div><div class="stat-label">صحيح</div></div>
                <div class="stat"><div class="stat-value" id="score-percent">0%</div><div class="stat-label">النتيجة</div></div>
            </div>
            <div class="progress-bar-container"><div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div></div>
        </div>
        <div id="questions-container"></div>
        <div class="results-card" id="results-card">
            <div class="results-score" id="final-score">0%</div>
            <div class="results-text">أجبت <span id="final-correct">0</span> من أصل <span id="final-total">0</span> سؤال بشكل صحيح</div>
            <div class="results-message" id="results-message"></div>
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="resetQuiz()">حاول مرة أخرى</button>
                <a href="index-ar.html" class="btn btn-secondary">العودة للرئيسية</a>
            </div>
        </div>
        <footer style="text-align:center;margin-top:40px;padding:20px;color:#64748b;font-size:0.9rem;">
            <p>CYB236 - أمن تطبيقات الويب | جامعة الملك عبدالعزيز</p>
            <p style="margin-top:10px;">إعداد د. المالوي</p>
        </footer>
    </div>
    <script>
        const questions = [
            {
                question: "ما هو المبدأ الأساسي للدفاع ضد هجمات XSS؟",
                options: [
                    { text: "حظر جميع أكواد JavaScript", correct: false },
                    { text: "عدم السماح أبدًا بإدخال بيانات المستخدم غير المعقّمة في DOM", correct: true },
                    { text: "تعطيل جميع النماذج", correct: false },
                    { text: "استخدام HTTP فقط (وليس HTTPS)", correct: false }
                ]
            },
            {
                question: "ما هي \"الخمسة الكبار\" في ترميز كيانات HTML؟",
                options: [
                    { text: "خمسة متصفحات رئيسية", correct: false },
                    { text: "الأحرف الخمسة التي يجب ترميزها: علامة العطف، أصغر من، أكبر من، علامة الاقتباس المزدوجة، علامة الاقتباس المفردة", correct: true },
                    { text: "خمسة أنواع من XSS", correct: false },
                    { text: "خمسة رؤوس أمنية", correct: false }
                ]
            },
            {
                question: "ما هو Content Security Policy (CSP)؟",
                options: [
                    { text: "وثيقة سياسة الشركة", correct: false },
                    { text: "إعداد أمني على مستوى المتصفح يقيّد المصادر التي يمكنها تنفيذ البرامج النصية على الصفحة", correct: true },
                    { text: "سياسة كلمات المرور", correct: false },
                    { text: "مواصفات أجهزة الخادم", correct: false }
                ]
            },
            {
                question: "ماذا يعني توجيه CSP التالي: \"script-src 'self'\"؟",
                options: [
                    { text: "السماح بأي برنامج نصي من أي مكان", correct: false },
                    { text: "السماح فقط بالبرامج النصية من نفس أصل الصفحة", correct: true },
                    { text: "حظر جميع البرامج النصية", correct: false },
                    { text: "السماح بالبرامج النصية المضمّنة فقط", correct: false }
                ]
            },
            {
                question: "لماذا لا يحمي CSP من هجمات DOM-based XSS؟",
                options: [
                    { text: "لأن CSP قديم", correct: false },
                    { text: "لأن DOM XSS يحدث بالكامل في JavaScript من جانب العميل دون تحميل برامج نصية خارجية", correct: true },
                    { text: "لأن CSP يعمل على الخوادم فقط", correct: false },
                    { text: "لأن DOM XSS غير موجود", correct: false }
                ]
            },
            {
                question: "كيف يمكن استخدام CSS كوسيلة هجوم لاستخراج البيانات؟",
                options: [
                    { text: "لا يمكن استخدام CSS للهجمات", correct: false },
                    { text: "يمكن لمحددات CSS مع background:url() تسريب قيم حقول النماذج إلى خوادم خارجية", correct: true },
                    { text: "CSS يؤثر على الألوان فقط", correct: false },
                    { text: "CSS آمن دائمًا", correct: false }
                ]
            },
            {
                question: "ما هو الدفاع الأساسي ضد هجمات CSRF؟",
                options: [
                    { text: "CAPTCHA", correct: false },
                    { text: "رموز CSRF - رموز فريدة مولّدة بالتشفير تُرسل مع كل طلب", correct: true },
                    { text: "تعطيل ملفات تعريف الارتباط (Cookies)", correct: false },
                    { text: "استخدام طلبات GET فقط", correct: false }
                ]
            },
            {
                question: "كيف تعمل رموز CSRF؟",
                options: [
                    { text: "تقوم بتشفير الصفحة بالكامل", correct: false },
                    { text: "يولّد الخادم رمزًا فريدًا لكل جلسة؛ يرسله العميل مع كل طلب؛ يتحقق الخادم منه", correct: true },
                    { text: "تحظر جميع الطلبات الخارجية", correct: false },
                    { text: "تحل محل كلمات المرور", correct: false }
                ]
            },
            {
                question: "ما هي القاعدة الأساسية لمنع هجمات CSRF المبنية على GET؟",
                options: [
                    { text: "تشفير جميع طلبات GET", correct: false },
                    { text: "يجب ألا تغيّر طلبات HTTP GET حالة الخادم أبدًا", correct: true },
                    { text: "حظر جميع طلبات GET", correct: false },
                    { text: "طلب تسجيل الدخول لطلبات GET", correct: false }
                ]
            },
            {
                question: "لماذا يجب تطبيق دفاعات CSRF على مستوى التطبيق بالكامل وليس لكل نقطة نهاية؟",
                options: [
                    { text: "لأنه أسهل في الإعداد", correct: false },
                    { text: "لأن نقطة نهاية واحدة غير محمية تكسر سلسلة الدفاع بالكامل", correct: true },
                    { text: "لأنه يوفر موارد الخادم", correct: false },
                    { text: "لأن الحماية لكل نقطة نهاية مكلفة جدًا", correct: false }
                ]
            },
            {
                question: "ما هي رؤوس HTTP التي يمكن فحصها للمساعدة في التحقق من مصادر الطلبات لمنع CSRF؟",
                options: [
                    { text: "Content-Type و Accept", correct: false },
                    { text: "رأسا Origin و Referer", correct: true },
                    { text: "Authorization و Cookie", correct: false },
                    { text: "Cache-Control و Pragma", correct: false }
                ]
            },
            {
                question: "ما هو أبسط إصلاح لثغرات XXE (XML External Entity)؟",
                options: [
                    { text: "ترقية نظام التشغيل", correct: false },
                    { text: "تعطيل الكيانات الخارجية في إعدادات محلل XML", correct: true },
                    { text: "تشفير جميع ملفات XML", correct: false },
                    { text: "التحول إلى لغة برمجة مختلفة", correct: false }
                ]
            },
            {
                question: "لماذا يُفضّل JSON على XML من منظور أمني؟",
                options: [
                    { text: "لأن JSON أسرع", correct: false },
                    { text: "لأن JSON لا يحتوي على آلية كيانات خارجية، مما يزيل خطر XXE تمامًا", correct: true },
                    { text: "لأن JSON مشفر افتراضيًا", correct: false },
                    { text: "لأنه لا يمكن تحليل JSON", correct: false }
                ]
            },
            {
                question: "إلى ماذا يمكن أن تتصاعد ثغرات XXE بخلاف قراءة الملفات فقط؟",
                options: [
                    { text: "قراءة الملفات النصية فقط", correct: false },
                    { text: "فحص الشبكة الداخلية، سرقة بيانات الاعتماد، وربما تنفيذ التعليمات البرمجية عن بُعد", correct: true },
                    { text: "عرض رسائل الخطأ فقط", correct: false },
                    { text: "إبطاء الخادم فقط", correct: false }
                ]
            },
            {
                question: "ما هو خط الدفاع الأول ضد حقن SQL؟",
                options: [
                    { text: "التحقق من صحة المدخلات", correct: false },
                    { text: "العبارات المُعدّة مسبقًا (الاستعلامات المُعلمة)", correct: true },
                    { text: "قواعد جدار الحماية", correct: false },
                    { text: "التشفير", correct: false }
                ]
            },
            {
                question: "كيف تمنع العبارات المُعدّة مسبقًا حقن SQL؟",
                options: [
                    { text: "تقوم بتشفير الاستعلام", correct: false },
                    { text: "يتم تجميع بنية الاستعلام أولاً مع عناصر نائبة، ثم تُزوّد بيانات المستخدم بشكل منفصل، فلا يمكن للمدخلات تغيير هدف الاستعلام", correct: true },
                    { text: "تحظر جميع الاستعلامات", correct: false },
                    { text: "تتحقق من صحة مدخلات المستخدم", correct: false }
                ]
            },
            {
                question: "ما هو مبدأ أقل صلاحية (PoLA)؟",
                options: [
                    { text: "منح جميع المستخدمين صلاحيات المسؤول", correct: false },
                    { text: "يجب أن يكون لكل وحدة حق الوصول فقط إلى البيانات والوظائف التي تحتاجها", correct: true },
                    { text: "إزالة جميع ضوابط الوصول", correct: false },
                    { text: "استخدام أقل كمية من الأكواد", correct: false }
                ]
            },
            {
                question: "كيف يقلل مبدأ PoLA من تأثير حقن SQL؟",
                options: [
                    { text: "يمنع جميع استعلامات SQL", correct: false },
                    { text: "إذا حدث الحقن في وحدة ذات صلاحيات محدودة، فإن المهاجم لا يستطيع تنفيذ إلا العمليات المصرح بها لتلك الوحدة", correct: true },
                    { text: "يقوم بتشفير قاعدة البيانات", correct: false },
                    { text: "يحظر جميع مدخلات المستخدم", correct: false }
                ]
            },
            {
                question: "ما هي \"القائمة البيضاء للأوامر\" كاستراتيجية دفاعية؟",
                options: [
                    { text: "السماح بجميع الأوامر افتراضيًا", correct: false },
                    { text: "الموافقة صراحةً على الأوامر المعروفة والآمنة فقط ورفض كل شيء آخر", correct: true },
                    { text: "حظر الأوامر من قائمة محددة", correct: false },
                    { text: "تشفير جميع الأوامر", correct: false }
                ]
            },
            {
                question: "لماذا تكون البرمجيات الوسيطة لمكافحة CSRF على مستوى التطبيق أكثر فعالية من الحماية لكل مسار؟",
                options: [
                    { text: "لأنها أسرع", correct: false },
                    { text: "لأن البرمجيات الوسيطة تعمل على كل طلب تلقائيًا، مما يمنع المطورين من ترك نقاط نهاية غير محمية عن طريق الخطأ", correct: true },
                    { text: "لأنها تتطلب كودًا أقل", correct: false },
                    { text: "لأنها تحمي الصفحة الرئيسية فقط", correct: false }
                ]
            }
        ];
        let answeredQuestions = new Set();
        let correctAnswers = 0;
        const totalQuestions = questions.length;
        function shuffleArray(array) { const shuffled = [...array]; for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; } return shuffled; }
        function renderQuestions() {
            const container = document.getElementById('questions-container'); container.innerHTML = '';
            questions.forEach((q, index) => {
                const card = document.createElement('div'); card.className = 'question-card'; card.id = `question-${index}`;
                const shuffledOptions = shuffleArray(q.options.map((opt, i) => ({ ...opt, originalIndex: i })));
                const optionsHTML = `<ul class="options-list">${shuffledOptions.map(opt => `<li class="option-item"><label class="option-label" data-question="${index}" data-correct="${opt.correct}"><input type="radio" name="question-${index}" value="${opt.correct}"><span class="option-marker"></span><span class="option-text">${opt.text}</span></label></li>`).join('')}</ul>`;
                card.innerHTML = `<div class="question-header"><span class="question-number">${index + 1}</span><span class="question-type">اختيار من متعدد</span></div><p class="question-text">${q.question}</p>${optionsHTML}<div class="feedback" id="feedback-${index}"></div>`;
                container.appendChild(card);
            });
            document.querySelectorAll('.option-label').forEach(label => { label.addEventListener('click', handleAnswer); });
        }
        function handleAnswer(e) {
            const label = e.currentTarget; const questionIndex = parseInt(label.dataset.question);
            const isCorrect = label.dataset.correct === 'true';
            const card = document.getElementById(`question-${questionIndex}`);
            const feedback = document.getElementById(`feedback-${questionIndex}`);
            if (answeredQuestions.has(questionIndex)) return; answeredQuestions.add(questionIndex);
            const allLabels = card.querySelectorAll('.option-label');
            allLabels.forEach(l => { l.style.pointerEvents = 'none'; if (l.dataset.correct === 'true') l.classList.add('show-correct'); });
            label.classList.add('selected');
            if (isCorrect) { correctAnswers++; label.classList.remove('selected'); label.classList.add('correct'); card.classList.add('correct'); feedback.className = 'feedback show correct'; feedback.innerHTML = '\u2713 إجابة صحيحة!'; }
            else { label.classList.add('incorrect'); card.classList.add('incorrect'); feedback.className = 'feedback show incorrect'; feedback.innerHTML = '\u2717 إجابة خاطئة - انظر الإجابة الصحيحة المحددة أعلاه'; }
            updateProgress();
        }
        function updateProgress() {
            const answered = answeredQuestions.size;
            const percent = totalQuestions > 0 ? Math.round((correctAnswers / totalQuestions) * 100) : 0;
            const progressPercent = Math.round((answered / totalQuestions) * 100);
            document.getElementById('answered-count').textContent = answered;
            document.getElementById('correct-count').textContent = correctAnswers;
            document.getElementById('score-percent').textContent = percent + '%';
            document.getElementById('progress-fill').style.width = progressPercent + '%';
            if (answered === totalQuestions) showResults();
        }
        function showResults() {
            const percent = Math.round((correctAnswers / totalQuestions) * 100);
            document.getElementById('final-score').textContent = percent + '%';
            document.getElementById('final-correct').textContent = correctAnswers;
            document.getElementById('final-total').textContent = totalQuestions;
            let message = '';
            if (percent >= 90) message = 'ممتاز! أنت مستعد جيدًا!';
            else if (percent >= 70) message = 'أحسنت! واصل التدريب!';
            else if (percent >= 50) message = 'لا بأس، لكن راجع المادة.';
            else message = 'واصل المذاكرة وحاول مرة أخرى!';
            document.getElementById('results-message').textContent = message;
            document.getElementById('results-card').classList.add('show');
        }
        function resetQuiz() { answeredQuestions.clear(); correctAnswers = 0; document.getElementById('results-card').classList.remove('show'); renderQuestions(); updateProgress(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        renderQuestions(); updateProgress();
    </script>
</body>
</html>
